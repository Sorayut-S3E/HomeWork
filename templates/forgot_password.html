{% extends "base.html" %}
{% block title %}ลืมรหัสผ่าน{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto;">
    <h2>ลืมรหัสผ่าน</h2>
    <form method="post">
        <label>กรอกอีเมลที่ใช้สมัคร</label>
        <input type="email" name="email" required>
        <button class="btn" type="submit">สร้างลิงก์รีเซ็ต</button>
    </form>

    {% if reset_link %}
        <hr>
        <p><strong>ลิงก์รีเซ็ตสำหรับทดสอบ:</strong></p>
        <p><a href="{{ reset_link }}">{{ reset_link }}</a></p>
    {% endif %}
</div>
{% endblock %}
